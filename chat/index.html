<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fff;
    --text: #111;
    --muted: #888;
    --border: #e5e5e5;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .back { font-size: 13px; color: var(--muted); text-decoration: none; }
  .back:hover { color: var(--text); }

  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ccc; transition: background 0.4s; flex-shrink: 0;
  }
  .status-dot.live { background: #111; }

  .status-text { font-size: 12px; color: var(--muted); }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .username-display { font-size: 12px; color: var(--muted); }

  .btn-text {
    font-size: 12px; color: var(--muted); background: none; border: none;
    cursor: pointer; padding: 0; text-decoration: underline; font-family: inherit;
  }
  .btn-text:hover { color: var(--text); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,0.94);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: #fff; border: 1px solid var(--border); border-radius: 6px;
    padding: 28px 24px; width: 320px;
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .modal input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 14px; font-family: inherit; outline: none; margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--text); }
  .modal button {
    width: 100%; padding: 10px; background: #111; color: #fff; border: none;
    border-radius: 4px; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer;
  }
  .modal button:hover { background: #333; }

  /* Setup banner */
  #setup-banner {
    background: #fffbe6; border-bottom: 1px solid #f0e68c;
    padding: 12px 24px; font-size: 13px; color: #555; line-height: 1.5;
  }
  #setup-banner.hidden { display: none; }
  #setup-banner strong { color: #111; }
  #setup-banner code {
    background: #f5f5f5; border: 1px solid #ddd; border-radius: 3px;
    padding: 1px 5px; font-size: 12px;
  }

  /* Messages */
  #messages-wrap { flex: 1; overflow-y: auto; padding: 16px 24px; }

  .day-label {
    text-align: center; font-size: 11px; color: var(--muted);
    margin: 16px 0 10px; position: relative;
  }
  .day-label::before, .day-label::after {
    content: ''; position: absolute; top: 50%;
    width: calc(50% - 44px); height: 1px; background: var(--border);
  }
  .day-label::before { left: 0; }
  .day-label::after { right: 0; }

  .msg { display: flex; gap: 10px; margin-bottom: 14px; max-width: 680px; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; background: #111; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px;
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
  .msg-name { font-size: 13px; font-weight: 600; }
  .msg-name.me { color: #555; }
  .msg-time { font-size: 11px; color: var(--muted); }
  .msg-text { font-size: 14px; line-height: 1.55; word-break: break-word; }

  /* Live typing previews */
  #live-area { padding: 0 24px 4px; flex-shrink: 0; }

  .live-row {
    display: flex; gap: 10px; align-items: flex-start;
    opacity: 0.45; margin-bottom: 6px;
  }
  .live-row .msg-avatar { background: #bbb; }
  .live-row .msg-name { font-size: 12px; color: var(--muted); font-weight: 500; }
  .live-row .msg-text { font-size: 13px; color: var(--muted); font-style: italic; }

  /* Typing bar */
  #typing-bar {
    padding: 2px 24px 6px; min-height: 20px;
    font-size: 12px; color: var(--muted); flex-shrink: 0;
  }

  .dots {
    display: inline-flex; gap: 3px; vertical-align: middle; margin-left: 4px;
  }
  .dots span {
    width: 4px; height: 4px; border-radius: 50%; background: var(--muted);
    animation: bop 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }

  @keyframes bop {
    0%,80%,100% { transform: translateY(0); opacity: .35; }
    40% { transform: translateY(-4px); opacity: 1; }
  }

  /* Input */
  #input-area {
    padding: 10px 24px 18px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .input-row { display: flex; gap: 8px; }
  #msg-input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 14px; font-family: inherit; outline: none; height: 42px;
  }
  #msg-input:focus { border-color: var(--text); }
  #msg-input:disabled { background: #fafafa; color: var(--muted); }
  #send-btn {
    padding: 10px 18px; background: #111; color: #fff; border: none; border-radius: 4px;
    font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; height: 42px;
  }
  #send-btn:hover { background: #333; }
  #send-btn:disabled { background: #ccc; cursor: not-allowed; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

  @media (max-width: 600px) {
    header, #messages-wrap, #input-area, #live-area, #typing-bar { padding-left: 16px; padding-right: 16px; }
    #setup-banner { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

  const ABLY_API_KEY = '1Y-saA.bKy7Vw:VO_jvb0TFzxiKVyfUUwo0WLGr1Zq1Y17UDQFKy8pQwM';  // ← paste your Ably API key here
</script>
<!-- ─────────────────────────────────────────────────────────────────────────── -->

<div class="modal-overlay hidden" id="name-modal">
  <div class="modal">
    <h2>Join the chat</h2>
    <p>Pick a display name. You can change it later.</p>
    <input type="text" id="name-input" placeholder="Your name" maxlength="24" autocomplete="off">
    <button id="name-btn">Join</button>
  </div>
</div>

<header>
  <a class="back" href="/">← Study Hub</a>
  <span class="logo">Chat</span>
  <span class="status-dot" id="status-dot"></span>
  <span class="status-text" id="status-text">connecting…</span>
  <div class="header-right">
    <span class="username-display" id="username-display"></span>
    <button class="btn-text" id="btn-rename">change name</button>
  </div>
</header>

<div id="setup-banner" class="hidden">
  <strong>Setup needed:</strong> Open <code>chat/index.html</code>, find the line
  <code>const ABLY_API_KEY = ''</code> and paste your
  <a href="https://ably.com" target="_blank" rel="noopener">free Ably API key</a> there. Takes ~2 min, no credit card.
</div>

<div id="messages-wrap"><div id="messages-list"></div></div>

<div id="live-area"></div>
<div id="typing-bar"></div>

<div id="input-area">
  <div class="input-row">
    <input type="text" id="msg-input" placeholder="Message…" maxlength="500" autocomplete="off" disabled>
    <button id="send-btn" disabled>Send</button>
  </div>
  <div class="hint">Enter to send</div>
</div>

<script>
(function() {

  if (!ABLY_API_KEY) {
    document.getElementById('setup-banner').classList.remove('hidden');
    document.getElementById('status-text').textContent = 'not configured';
    return;
  }

  // ── Identity ────────────────────────────────────────────────────────────────
  let username = localStorage.getItem('chat-name') || '';
  let userId   = localStorage.getItem('chat-uid');
  if (!userId) {
    userId = 'u' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('chat-uid', userId);
  }

  function setUsername(name) {
    username = (name || '').trim().slice(0, 24) || 'Anonymous';
    localStorage.setItem('chat-name', username);
    document.getElementById('username-display').textContent = username;
    if (channel) {
      channel.presence.update({ user: username, uid: userId, typing: '' });
    }
  }

  // ── Name modal ───────────────────────────────────────────────────────────────
  const modal     = document.getElementById('name-modal');
  const nameInput = document.getElementById('name-input');

  function showModal() {
    modal.classList.remove('hidden');
    nameInput.value = username;
    setTimeout(() => nameInput.focus(), 50);
  }

  function submitName() {
    const val = nameInput.value.trim();
    if (!val) return;
    setUsername(val);
    modal.classList.add('hidden');
  }

  document.getElementById('name-btn').addEventListener('click', submitName);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitName(); });
  document.getElementById('btn-rename').addEventListener('click', showModal);

  if (!username) showModal();
  else document.getElementById('username-display').textContent = username;

  // ── Ably setup ───────────────────────────────────────────────────────────────
  const ably    = new Ably.Realtime({ key: ABLY_API_KEY, clientId: userId });
  const channel = ably.channels.get('ryanssite-chat-v1');

  const dot     = document.getElementById('status-dot');
  const statusTx = document.getElementById('status-text');

  ably.connection.on('connected', () => {
    dot.classList.add('live');
    statusTx.textContent = 'live';
    document.getElementById('msg-input').disabled  = false;
    document.getElementById('send-btn').disabled   = false;
    loadHistory();
    enterPresence();
  });

  ably.connection.on('disconnected', () => {
    dot.classList.remove('live');
    statusTx.textContent = 'reconnecting…';
  });

  ably.connection.on('failed', () => {
    statusTx.textContent = 'connection failed';
  });

  // ── Message history ──────────────────────────────────────────────────────────
  const rendered = new Set();
  const msgsList = document.getElementById('messages-list');
  const wrap     = document.getElementById('messages-wrap');
  let   atBottom = true;

  wrap.addEventListener('scroll', () => {
    atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 80;
  });

  async function loadHistory() {
    try {
      const page = await channel.history({ limit: 100, direction: 'backwards' });
      const items = page.items.reverse();
      items.forEach(msg => {
        if (msg.name === 'msg') renderMessage(msg.data, msg.id, true);
      });
      scrollToBottom(true);
    } catch(e) {
      console.warn('History fetch failed:', e);
    }
  }

  // Subscribe to live messages
  channel.subscribe('msg', msg => {
    renderMessage(msg.data, msg.id, false);
    if (atBottom) scrollToBottom(true);
  });

  // ── Rendering ────────────────────────────────────────────────────────────────
  let lastDay = '';

  function renderMessage(data, id, historical) {
    if (!data || !data.text || rendered.has(id)) return;
    rendered.add(id);

    const day = formatDay(data.time || Date.now());
    if (day !== lastDay) {
      lastDay = day;
      const lbl = document.createElement('div');
      lbl.className = 'day-label';
      lbl.textContent = day;
      msgsList.appendChild(lbl);
    }

    const isMe = data.uid === userId;
    const el = document.createElement('div');
    el.className = 'msg';
    el.innerHTML = `
      <div class="msg-avatar">${initials(data.user)}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name${isMe ? ' me' : ''}">${esc(data.user || 'Anonymous')}</span>
          <span class="msg-time">${formatTime(data.time)}</span>
        </div>
        <div class="msg-text">${esc(data.text)}</div>
      </div>`;
    msgsList.appendChild(el);
  }

  function scrollToBottom(force) {
    if (force || atBottom) wrap.scrollTop = wrap.scrollHeight;
  }

  // ── Send ─────────────────────────────────────────────────────────────────────
  const inputEl = document.getElementById('msg-input');

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !username) return;
    channel.publish('msg', { user: username, uid: userId, text, time: Date.now() });
    inputEl.value = '';
    updateTyping('');
  }

  document.getElementById('send-btn').addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Typing via Presence ───────────────────────────────────────────────────────
  let typingTimer = null;

  function enterPresence() {
    channel.presence.enter({ user: username, uid: userId, typing: '' });
  }

  function updateTyping(text) {
    channel.presence.update({ user: username, uid: userId, typing: text });
    clearTimeout(typingTimer);
    if (text) {
      typingTimer = setTimeout(() => updateTyping(''), 4000);
    }
  }

  inputEl.addEventListener('input', e => updateTyping(e.target.value));

  // Listen to presence for typing
  const othersPresence = new Map(); // uid → presenceData

  channel.presence.subscribe(presenceMsg => {
    const d = presenceMsg.data;
    if (!d || !d.uid || d.uid === userId) return;

    if (presenceMsg.action === 'leave' || presenceMsg.action === 'absent') {
      othersPresence.delete(d.uid);
    } else {
      othersPresence.set(d.uid, d);
    }
    renderTyping();
  });

  function renderTyping() {
    const active = [...othersPresence.values()].filter(d => d.typing && d.typing.trim());
    const liveArea  = document.getElementById('live-area');
    const typingBar = document.getElementById('typing-bar');

    // Live previews
    liveArea.innerHTML = '';
    active.forEach(d => {
      const el = document.createElement('div');
      el.className = 'live-row';
      el.innerHTML = `
        <div class="msg-avatar">${initials(d.user)}</div>
        <div class="msg-body">
          <div class="msg-header"><span class="msg-name">${esc(d.user || 'Someone')}</span></div>
          <div class="msg-text">${esc(d.typing)}</div>
        </div>`;
      liveArea.appendChild(el);
    });

    // Typing bar
    if (!active.length) { typingBar.innerHTML = ''; return; }
    const names = active.map(d => esc(d.user || 'Someone'));
    let label = names.length === 1
      ? `${names[0]} is typing`
      : names.length === 2
        ? `${names[0]} and ${names[1]} are typing`
        : `${names[0]} and ${names.length - 1} others are typing`;
    typingBar.innerHTML = `${label}<span class="dots"><span></span><span></span><span></span></span>`;
  }

  // ── Presence: get current members on join ────────────────────────────────────
  channel.presence.get((err, members) => {
    if (err || !members) return;
    members.forEach(m => {
      if (m.data && m.data.uid && m.data.uid !== userId) {
        othersPresence.set(m.data.uid, m.data);
      }
    });
    renderTyping();
  });

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function initials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function formatDay(ts) {
    const d = new Date(ts);
    const today = new Date();
    const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Today';
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.addEventListener('beforeunload', () => {
    channel.presence.leave();
  });

})();
</script>
</body>
</html>
