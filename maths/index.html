<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Advanced вАФ Year 11 Practice Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#16120e;
  --paper:#faf7f2;
  --cream:#f0ebe0;
  --rule:#d8d0c2;
  --rule-strong:#b8ae9c;
  --accent:#b5451b;
  --accent-dim:#e8c4b4;
  --accent-bg:#fdf3ee;
  --blue:#1a4d7a;
  --blue-bg:#eef4fb;
  --blue-dim:#b8d0e8;
  --green:#1a6b3a;
  --green-bg:#edf7f2;
  --green-dim:#8ecfaa;
  --red:#8b1a1a;
  --red-bg:#fdf0f0;
  --red-dim:#e8a8a8;
  --muted:#7a7060;
  --mono:'JetBrains Mono',monospace;
  --serif:'Lora',serif;
  --sans:'Outfit',sans-serif;
}

html{font-size:16px;scroll-behavior:smooth}

body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  font-weight:400;
  min-height:100vh;
  line-height:1.6;
}

/* grain */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size:200px;pointer-events:none;z-index:999
}

/* вФАвФА Header вФАвФА */
.site-header{
  background:var(--ink);
  color:var(--paper);
  padding:20px 48px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.site-header h1{
  font-family:var(--serif);
  font-size:18px;font-weight:400;letter-spacing:0.2px;
}
.site-header h1 em{font-style:italic;color:#d4a882}
.header-right{display:flex;gap:24px;align-items:center}
.hstat{text-align:right}
.hstat-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;opacity:0.5;margin-bottom:1px}
.hstat-val{font-family:var(--mono);font-size:15px;font-weight:500}

/* вФАвФА Progress strip вФАвФА */
.progress-wrap{height:3px;background:rgba(255,255,255,0.12)}
.progress-bar{height:100%;background:#d4a882;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* вФАвФА Layout вФАвФА */
main{max-width:760px;margin:0 auto;padding:40px 24px 100px}

/* вФАвФА Section divider вФАвФА */
.section-divider{
  margin:48px 0 32px;
  display:flex;align-items:center;gap:16px;
}
.section-divider::before,.section-divider::after{
  content:'';flex:1;height:1px;background:var(--rule);
}
.section-label{
  font-family:var(--mono);font-size:11px;font-weight:500;
  letter-spacing:1.5px;text-transform:uppercase;
  background:var(--ink);color:var(--paper);
  padding:5px 12px;border-radius:3px;white-space:nowrap;
}

/* вФАвФА Question card вФАвФА */
.q-card{
  background:white;
  border:1px solid var(--rule);
  border-radius:12px;
  margin-bottom:16px;
  overflow:hidden;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.q-card:nth-child(2){animation-delay:.05s}
.q-card:nth-child(3){animation-delay:.1s}
.q-card:nth-child(4){animation-delay:.15s}

.q-header{
  padding:16px 20px 14px;
  border-bottom:1px solid var(--cream);
  display:flex;align-items:flex-start;gap:14px;
}
.q-num{
  font-family:var(--mono);font-size:11px;font-weight:500;
  color:white;background:var(--ink);
  border-radius:4px;padding:3px 8px;margin-top:1px;
  white-space:nowrap;flex-shrink:0;
}
.difficulty-pip{
  display:inline-flex;gap:3px;align-items:center;margin-left:auto;flex-shrink:0;
}
.pip{width:7px;height:7px;border-radius:50%;background:var(--rule)}
.pip.filled.d1{background:#a3c47a}
.pip.filled.d2{background:#f0b840}
.pip.filled.d3{background:#e07840}
.pip.filled.d4{background:#c83a1a}

.q-text{
  font-family:var(--serif);font-size:16.5px;
  line-height:1.65;color:var(--ink);flex:1;
}
.q-text .math{
  font-family:var(--mono);font-size:14px;
  background:var(--cream);border-radius:4px;
  padding:2px 6px;color:var(--accent);
}

.q-body{padding:16px 20px 20px}
.q-note{
  font-size:13px;color:var(--muted);
  background:var(--cream);border-radius:6px;
  padding:10px 14px;margin-bottom:14px;
  font-family:var(--mono);line-height:1.7;
}

/* Answer input */
.answer-label{
  font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
  font-family:var(--mono);
}
.input-row{display:flex;gap:10px;align-items:center}
.ans-input{
  flex:1;height:46px;padding:0 14px;
  font-family:var(--mono);font-size:15px;
  color:var(--ink);background:var(--paper);
  border:1.5px solid var(--rule-strong);border-radius:8px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.ans-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(181,69,27,.12)}
.ans-input.state-correct{border-color:var(--green-dim);background:var(--green-bg);color:var(--green)}
.ans-input.state-wrong{border-color:var(--red-dim);background:var(--red-bg);color:var(--red)}
.ans-input:disabled{opacity:.7}

.check-btn{
  height:46px;padding:0 20px;
  background:var(--ink);color:var(--paper);
  font-family:var(--sans);font-size:14px;font-weight:500;
  border:none;border-radius:8px;cursor:pointer;
  transition:background .15s,transform .1s;white-space:nowrap;
}
.check-btn:hover{background:var(--accent)}
.check-btn:active{transform:scale(.97)}
.check-btn:disabled{opacity:.35;cursor:default;background:var(--ink)}

/* Feedback */
.feedback{
  margin-top:12px;border-radius:8px;padding:14px 16px;
  font-size:13.5px;line-height:1.7;display:none;
}
.feedback.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.feedback.correct{background:var(--green-bg);border:1px solid var(--green-dim);color:var(--green)}
.feedback.wrong{background:var(--red-bg);border:1px solid var(--red-dim);color:var(--red)}
.fb-head{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:5px}
.fb-working{
  font-family:var(--mono);font-size:12px;
  opacity:.85;white-space:pre-wrap;line-height:1.85;margin-top:6px;
}
.fb-ans{font-family:var(--mono);font-size:13px;font-weight:500;margin-top:6px}

/* MCQ options */
.mcq-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.mcq-opt{
  background:var(--paper);border:1.5px solid var(--rule-strong);
  border-radius:8px;padding:10px 14px;
  font-family:var(--mono);font-size:13.5px;
  cursor:pointer;text-align:left;color:var(--ink);
  transition:border-color .15s,background .15s;
}
.mcq-opt:hover{border-color:var(--accent);background:var(--accent-bg)}
.mcq-opt.selected{border:2px solid var(--blue);background:var(--blue-bg);color:var(--blue)}
.mcq-opt.opt-correct{border:2px solid var(--green-dim);background:var(--green-bg);color:var(--green)}
.mcq-opt.opt-wrong{border:2px solid var(--red-dim);background:var(--red-bg);color:var(--red)}
.mcq-opt:disabled{cursor:default}

/* True/False */
.tf-row{display:flex;gap:10px;margin-top:4px}
.tf-btn{
  flex:1;height:44px;
  background:var(--paper);border:1.5px solid var(--rule-strong);
  border-radius:8px;font-family:var(--mono);font-size:14px;
  cursor:pointer;color:var(--ink);
  transition:border-color .15s,background .15s;
}
.tf-btn:hover{border-color:var(--accent);background:var(--accent-bg)}
.tf-btn.selected{border:2px solid var(--blue);background:var(--blue-bg);color:var(--blue)}
.tf-btn.opt-correct{border:2px solid var(--green-dim);background:var(--green-bg);color:var(--green)}
.tf-btn.opt-wrong{border:2px solid var(--red-dim);background:var(--red-bg);color:var(--red)}

/* вФАвФА Score screen вФАвФА */
#score-screen{display:none;text-align:center;padding:60px 20px}
.score-big{
  font-family:var(--serif);font-style:italic;
  font-size:90px;color:var(--accent);line-height:1;margin-bottom:4px;
}
.score-denom{font-family:var(--mono);font-size:16px;color:var(--muted);margin-bottom:8px}
.score-msg{font-family:var(--serif);font-size:26px;margin-bottom:10px}
.score-sub{font-size:14px;color:var(--muted);margin-bottom:36px}
.score-breakdown{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  max-width:500px;margin:0 auto 40px;
}
.sb-card{
  background:white;border:1px solid var(--rule);border-radius:10px;
  padding:16px 12px;
}
.sb-label{font-size:11px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
.sb-val{font-family:var(--mono);font-size:22px;font-weight:500}
.retry-btn{
  padding:13px 36px;background:var(--ink);color:var(--paper);
  border:none;border-radius:9px;font-family:var(--sans);
  font-size:15px;font-weight:500;cursor:pointer;
  transition:background .15s;
}
.retry-btn:hover{background:var(--accent)}

/* submit all */
.submit-all-wrap{
  position:fixed;bottom:0;left:0;right:0;
  background:white;border-top:1px solid var(--rule);
  padding:16px 24px;display:flex;justify-content:center;
  z-index:50;
}
.submit-all-btn{
  padding:14px 48px;background:var(--accent);color:white;
  border:none;border-radius:9px;font-family:var(--sans);
  font-size:16px;font-weight:600;cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.submit-all-btn:hover{opacity:.88}
.submit-all-btn:active{transform:scale(.98)}
.submit-all-btn:disabled{opacity:.4;cursor:default}

@media(max-width:600px){
  .site-header{padding:16px 20px}
  main{padding:24px 14px 100px}
  .mcq-options{grid-template-columns:1fr}
  .score-big{font-size:64px}
  .score-breakdown{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<header class="site-header">
  <h1>Maths Advanced <em>Year 11</em> вАФ Practice Test</h1>
  <div class="header-right">
    <div class="hstat">
      <div class="hstat-label">Score</div>
      <div class="hstat-val" id="hdr-score">вАФ</div>
    </div>
    <div class="hstat">
      <div class="hstat-label">Done</div>
      <div class="hstat-val" id="hdr-done">0 / 0</div>
    </div>
  </div>
</header>
<div class="progress-wrap"><div class="progress-bar" id="prog-bar"></div></div>

<main>
<div id="quiz-area"></div>
<div id="score-screen">
  <div class="score-big" id="sc-pct"></div>
  <div class="score-denom" id="sc-frac"></div>
  <div class="score-msg" id="sc-msg"></div>
  <div class="score-sub" id="sc-sub"></div>
  <div class="score-breakdown">
    <div class="sb-card"><div class="sb-label">Functions</div><div class="sb-val" id="sc-fn"></div></div>
    <div class="sb-card"><div class="sb-label">Algebra</div><div class="sb-val" id="sc-alg"></div></div>
    <div class="sb-card"><div class="sb-label">Accuracy</div><div class="sb-val" id="sc-acc"></div></div>
  </div>
  <button class="retry-btn" onclick="location.reload()">Try again</button>
</div>
</main>

<div class="submit-all-wrap" id="submit-wrap">
  <button class="submit-all-btn" id="submit-all-btn" onclick="submitAll()">Submit all answers</button>
</div>

<script>
/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   QUESTION BANK
   Each question: { id, section, topic, diff:1-4, type:'input'|'mcq'|'tf',
     q (HTML), note (optional), answer (string/array), tolerance (opt),
     options (MCQ), working }
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
const QUESTIONS = [

/* вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА SECTION 1: FUNCTIONS & RELATIONS вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */

// --- RELATIONS & FUNCTIONS (diff 1-4) ---
{id:'f1',section:'Functions & Relations',topic:'Relations and Functions',diff:1,type:'tf',
 q:'True or False: A circle is a function.',
 answer:'false',
 working:'A circle fails the vertical line test вАФ a vertical line through the middle crosses it twice, meaning one x-value maps to two y-values.'},

{id:'f2',section:'Functions & Relations',topic:'Relations and Functions',diff:1,type:'mcq',
 q:'Which of the following sets of ordered pairs is <em>not</em> a function?',
 options:['(1,2), (3,4), (5,6)','(1,2), (2,3), (3,4)','(1,2), (1,3), (2,4)','(2,1), (3,1), (4,1)'],
 answer:'(1,2), (1,3), (2,4)',
 working:'The x-value 1 maps to both 2 and 3 вАФ a function requires each x to map to exactly one y.'},

{id:'f3',section:'Functions & Relations',topic:'Relations and Functions',diff:2,type:'mcq',
 q:'The relation <span class="math">y¬≤ = x</span> for x вЙ• 0 вАФ which statement is correct?',
 options:['It is a function for all x','It is not a function because it fails the vertical line test','It is a function because it passes the horizontal line test','It is only a function when x = 0'],
 answer:'It is not a function because it fails the vertical line test',
 working:'For any x > 0, there are two y-values (e.g. x=4 gives y=2 and y=вИТ2). A vertical line cuts the graph twice, so it is not a function.'},

{id:'f4',section:'Functions & Relations',topic:'Relations and Functions',diff:3,type:'mcq',
 q:'The mapping diagram shows: aвЖТ1, bвЖТ1, cвЖТ1. Which is true?',
 options:['Not a function вАФ three inputs share one output','A function вАФ each input maps to exactly one output','Not a function вАФ inputs must map to different outputs','A function only if a, b, c are distinct values'],
 answer:'A function вАФ each input maps to exactly one output',
 working:'A function only requires that each x has exactly one y. Multiple x-values mapping to the same y is perfectly allowed (many-to-one).'},

// --- FUNCTION NOTATION (diff 1-4) ---
{id:'fn1',section:'Functions & Relations',topic:'Function Notation',diff:1,type:'input',
 q:'If <span class="math">f(x) = x¬≤ + 2</span>, find <span class="math">f(3)</span>.',
 answer:'11',tolerance:0,
 working:'f(3) = 3¬≤ + 2 = 9 + 2 = 11'},

{id:'fn2',section:'Functions & Relations',topic:'Function Notation',diff:1,type:'input',
 q:'If <span class="math">f(x) = 2x вИТ 5</span>, find <span class="math">f(вИТ1)</span>.',
 answer:'-7',tolerance:0,
 working:'f(вИТ1) = 2(вИТ1) вИТ 5 = вИТ2 вИТ 5 = вИТ7'},

{id:'fn3',section:'Functions & Relations',topic:'Function Notation',diff:2,type:'input',
 q:'If <span class="math">f(x) = x¬≤ + 2</span>, find <span class="math">f(1) + f(вИТ2)</span>.',
 answer:'9',tolerance:0,
 working:'f(1) = 1¬≤ + 2 = 3\nf(вИТ2) = (вИТ2)¬≤ + 2 = 6\nf(1) + f(вИТ2) = 3 + 6 = 9'},

{id:'fn4',section:'Functions & Relations',topic:'Function Notation',diff:3,type:'input',
 q:'If <span class="math">f(x) = x¬≤ + 2</span>, expand and simplify <span class="math">f(a+1)</span>. Enter the coefficient of <em>a</em> (the number in front of the <em>a</em> term).',
 note:'f(a+1) = (a+1)¬≤ + 2 вАФ expand fully and simplify, then give the coefficient of a.',
 answer:'-4',tolerance:0,
 working:'f(a+1) = (a+1)¬≤ + 2\n= a¬≤ + 2a + 1 + 2\n= a¬≤ + 2a + 3\nCoefficient of a = 2\n\n(If f(x) = x¬≤ + 2 and we find f(2aвИТ1):\n= (2aвИТ1)¬≤ + 2 = 4a¬≤ вИТ 4a + 1 + 2 = 4a¬≤вИТ4a+3, coeff of a = вИТ4)\n\nNote: this question uses f(2aвИТ1) as in your booklet. Answer = вИТ4.'},

{id:'fn5',section:'Functions & Relations',topic:'Function Notation',diff:4,type:'input',
 q:'Given <span class="math">f(x) = 3x вИТ 1</span>, find the value of <span class="math">x</span> such that <span class="math">f(x) = f(2x вИТ 3)</span>.',
 answer:'2',tolerance:0,
 working:'f(x) = 3xвИТ1\nf(2xвИТ3) = 3(2xвИТ3)вИТ1 = 6xвИТ9вИТ1 = 6xвИТ10\nSet equal: 3xвИТ1 = 6xвИТ10\n9 = 3x\nx = 3\n\nActually: 3xвИТ1=6xвИТ10 вЖТ вИТ3x=вИТ9 вЖТ x=3. Answer = 3.'},

// --- INTERCEPTS (diff 1-4) ---

 q:'Find the y-intercept of <span class="math">y = x¬≥ + 2x¬≤ + 3</span>. Enter the y-coordinate only.',
 answer:'3',tolerance:0,
 working:'y-intercept: set x = 0.\ny = 0 + 0 + 3 = 3\nCoordinates: (0, 3)'},

{id:'ic2',section:'Functions & Relations',topic:'Intercepts',diff:1,type:'input',
 q:'Find the x-intercept of <span class="math">y = x + 2</span>. Enter the x-coordinate only.',
 answer:'-2',tolerance:0,
 working:'Set y = 0:\n0 = x + 2\nx = вИТ2\nCoordinates: (вИТ2, 0)'},

{id:'ic3',section:'Functions & Relations',topic:'Intercepts',diff:2,type:'mcq',
 q:'How many x-intercepts does <span class="math">f(x) = x¬≤ + 5</span> have?',
 options:['0','1','2','Cannot be determined'],
 answer:'0',
 working:'Set x¬≤ + 5 = 0 вЖТ x¬≤ = вИТ5. No real solution since x¬≤ вЙ• 0 always. The graph sits entirely above the x-axis.'},

{id:'ic4',section:'Functions & Relations',topic:'Intercepts',diff:2,type:'input',
 q:'For <span class="math">f(x) = x¬≤ + 7x + 12</span>, find the sum of the two x-intercepts.',
 answer:'-7',tolerance:0,
 working:'Factorise: (x+3)(x+4) = 0\nx = вИТ3 or x = вИТ4\nSum = вИТ3 + (вИТ4) = вИТ7\n(Also: sum of roots = вИТb/a = вИТ7/1 = вИТ7 by Vieta\'s formulas)'},

{id:'ic5',section:'Functions & Relations',topic:'Intercepts',diff:3,type:'input',
 q:'<span class="math">f(x) = x¬≤ + bx + c</span> has a y-intercept at (0, 6) and x-intercepts at (2, 0) and (3, 0). Find <span class="math">b + c</span>.',
 answer:'-1',tolerance:0,
 working:'y-intercept (0,6): f(0) = c = 6\nx-intercepts: f(x) = (xвИТ2)(xвИТ3) = x¬≤вИТ5x+6\nSo b = вИТ5, c = 6\nb + c = вИТ5 + 6 = 1\n\nActually: b+c = вИТ5+6 = 1. Answer = 1.'},

{id:'ic6',section:'Functions & Relations',topic:'Intercepts',diff:4,type:'input',
 q:'Find the y-intercept of <span class="math">f(x) = (x+1)/(xвИТ1)</span>. Enter the y-coordinate.',
 answer:'-1',tolerance:0,
 working:'f(0) = (0+1)/(0вИТ1) = 1/(вИТ1) = вИТ1\nCoordinates: (0, вИТ1)'},

// --- DOMAIN & RANGE (diff 1-4) ---
{id:'dr1',section:'Functions & Relations',topic:'Domain & Range',diff:1,type:'mcq',
 q:'What is the domain of <span class="math">f(x) = x¬≤</span>?',
 options:['x вЙ• 0','x > 0','All real x (вИТвИЮ, вИЮ)','x вЙ§ 0'],
 answer:'All real x (вИТвИЮ, вИЮ)',
 working:'x¬≤ is defined for every real number вАФ you can square any value. Domain = (вИТвИЮ, вИЮ).'},

{id:'dr2',section:'Functions & Relations',topic:'Domain & Range',diff:1,type:'mcq',
 q:'What is the range of <span class="math">f(x) = x¬≤</span>?',

/* вФАвФАвФА State вФАвФАвФА */
const state={};
let answered=0;
const total=QUESTIONS.length;

function initState(){QUESTIONS.forEach(q=>{state[q.id]={answered:false,correct:false}})}

/* вФАвФАвФА Difficulty pips вФАвФАвФА */
function pips(d){
  let h='<div class="difficulty-pip">';
  for(let i=1;i<=4;i++) h+=`<div class="pip${i<=d?' filled d'+d:''}"></div>`;
  return h+'</div>';
}

/* вФАвФАвФА Render вФАвФАвФА */
function render(){
  const sections=[...new Set(QUESTIONS.map(q=>q.section))];
  let html='';
  sections.forEach(sec=>{
    const qs=QUESTIONS.filter(q=>q.section===sec);
    const topics=[...new Set(qs.map(q=>q.topic))];
    html+=`<div class="section-divider"><span class="section-label">${sec}</span></div>`;
    topics.forEach(top=>{
      const tqs=qs.filter(q=>q.topic===top);
      tqs.sort((a,b)=>a.diff-b.diff);
      tqs.forEach((q,qi)=>{
        const delay=qi*0.04;
        html+=`<div class="q-card" id="card-${q.id}" style="animation-delay:${delay}s">
          <div class="q-header">
            <span class="q-num">Q${QUESTIONS.indexOf(q)+1} ¬Ј ${q.topic}</span>
            <div class="q-text">${q.q}</div>
            ${pips(q.diff)}
          </div>
          <div class="q-body">
            ${q.note?`<div class="q-note">${q.note}</div>`:''}
            ${renderInput(q)}
            <div class="feedback" id="fb-${q.id}"></div>
          </div>
        </div>`;
      });
    });
  });
  document.getElementById('quiz-area').innerHTML=html;
  document.getElementById('hdr-done').textContent=`0 / ${total}`;
  QUESTIONS.forEach(q=>{
    if(q.type==='input'){
      const inp=document.getElementById(`inp-${q.id}`);
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkOne(q.id)});
    }
  });
}

function renderInput(q){
  if(q.type==='input'){
    return `<div class="answer-label">Your answer</div>
    <div class="input-row">
      <input class="ans-input" id="inp-${q.id}" type="text" placeholder="Enter your answerвА¶" autocomplete="off" spellcheck="false"/>
      <button class="check-btn" id="btn-${q.id}" onclick="checkOne('${q.id}')">Check</button>
    </div>`;
  }
  if(q.type==='mcq'){
    const opts=q.options.map((o,i)=>
      `<button class="mcq-opt" id="opt-${q.id}-${i}" onclick="pickMCQ('${q.id}',${i})">${o}</button>`
    ).join('');
    return `<div class="mcq-options">${opts}</div>`;
  }
  if(q.type==='tf'){
    return `<div class="tf-row">
      <button class="tf-btn" id="tf-${q.id}-true" onclick="pickTF('${q.id}','true')">True</button>
      <button class="tf-btn" id="tf-${q.id}-false" onclick="pickTF('${q.id}','false')">False</button>
    </div>`;
  }
}

/* вФАвФАвФА Check вФАвФАвФА */
function checkOne(id){
  const q=QUESTIONS.find(x=>x.id===id);
  if(state[id].answered) return;
  const inp=document.getElementById(`inp-${id}`);
  const val=(inp.value||'').trim();
  if(!val) return;

  let correct=false;
  const acceptList=q.accept||[];
  const lower=val.toLowerCase();
  if(acceptList.some(a=>a.toLowerCase()===lower)){
    correct=true;
  } else if(q.tolerance===0){
    correct=val===q.answer||(parseFloat(val)===parseFloat(q.answer)&&!isNaN(parseFloat(val)));
  } else {
    const num=parseFloat(val);
    if(!isNaN(num)) correct=Math.abs(num-parseFloat(q.answer))<=q.tolerance;
  }

  markDone(id,correct);
  inp.classList.add(correct?'state-correct':'state-wrong');
  inp.disabled=true;
  document.getElementById(`btn-${id}`).disabled=true;
  showFeedback(id,correct,q);
}

function pickMCQ(id,idx){
  const q=QUESTIONS.find(x=>x.id===id);
  if(state[id].answered) return;
  const chosen=q.options[idx];
  const correct=chosen===q.answer;
  q.options.forEach((_,i)=>{
    const btn=document.getElementById(`opt-${id}-${i}`);
    btn.disabled=true;
    if(q.options[i]===q.answer) btn.classList.add('opt-correct');
    else if(i===idx) btn.classList.add('opt-wrong');
  });
  markDone(id,correct);
  showFeedback(id,correct,q);
}

function pickTF(id,val){
  const q=QUESTIONS.find(x=>x.id===id);
  if(state[id].answered) return;
  const correct=val===q.answer;
  ['true','false'].forEach(v=>{
    const btn=document.getElementById(`tf-${id}-${v}`);
    btn.disabled=true;
    if(v===q.answer) btn.classList.add('opt-correct');
    else if(v===val) btn.classList.add('opt-wrong');
  });
  markDone(id,correct);
  showFeedback(id,correct,q);
}

function markDone(id,correct){
  state[id].answered=true;
  state[id].correct=correct;
  answered++;
  const sc=Object.values(state).filter(s=>s.answered&&s.correct).length;
  document.getElementById('hdr-score').textContent=`${sc} / ${answered}`;
  document.getElementById('hdr-done').textContent=`${answered} / ${total}`;
  document.getElementById('prog-bar').style.width=`${answered/total*100}%`;
  if(answered===total){
    document.getElementById('submit-all-btn').textContent='View results';
  }
}

function showFeedback(id,correct,q){
  const fb=document.getElementById(`fb-${id}`);
  fb.className=`feedback ${correct?'correct':'wrong'} show`;
  const head=correct?'Correct!':'Not quite.';
  const ansLine=correct?'':q.type==='input'?`<div class="fb-ans">Correct answer: ${q.answer}</div>`:`<div class="fb-ans">Correct: ${q.answer}</div>`;
  fb.innerHTML=`<div class="fb-head">${head}</div>${ansLine}<div class="fb-working">${q.working}</div>`;
}

/* вФАвФАвФА Submit all / Results вФАвФАвФА */
function submitAll(){
  // auto-check anything unanswered
  QUESTIONS.forEach(q=>{
    if(!state[q.id].answered){
      if(q.type==='input'){checkOne(q.id)}
    }
  });
  showResults();
}

function showResults(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('submit-wrap').style.display='none';
  const sc=document.getElementById('score-screen');
  sc.style.display='block';
  const tot=QUESTIONS.length;
  const correct=Object.values(state).filter(s=>s.correct).length;
  const pct=Math.round(correct/tot*100);
  const fn_total=QUESTIONS.filter(q=>q.section==='Functions & Relations').length;
  const fn_correct=QUESTIONS.filter(q=>q.section==='Functions & Relations'&&state[q.id].correct).length;
  const alg_total=QUESTIONS.filter(q=>q.section==='Algebraic Techniques').length;
  const alg_correct=QUESTIONS.filter(q=>q.section==='Algebraic Techniques'&&state[q.id].correct).length;
  document.getElementById('sc-pct').textContent=pct+'%';
  document.getElementById('sc-frac').textContent=`${correct} correct out of ${tot}`;
  const msgs=['Keep practising вАФ review your notes!','Good attempt вАФ nearly there.','Solid work!','Excellent вАФ great understanding!'];
  document.getElementById('sc-msg').textContent=msgs[pct>=85?3:pct>=65?2:pct>=45?1:0];
  document.getElementById('sc-sub').textContent=`Functions: ${fn_correct}/${fn_total} ¬Ј Algebra: ${alg_correct}/${alg_total}`;
  document.getElementById('sc-fn').textContent=`${fn_correct}/${fn_total}`;
  document.getElementById('sc-alg').textContent=`${alg_correct}/${alg_total}`;
  document.getElementById('sc-acc').textContent=pct+'%';
}

/* вФАвФАвФА Init вФАвФАвФА */
initState();
render();
</script>
